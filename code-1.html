<!DOCTYPE html>
<html>
<head>
    <title>Exam Marks Calculator</title>
</head>
<body>

    <h2>Exam Marks Calculator</h2>

    <label>Subject 1:</label>
    <input type="number" id="sub1"><br><br>

    <label>Subject 2:</label>
    <input type="number" id="sub2"><br><br>

    <label>Subject 3:</label>
    <input type="number" id="sub3"><br><br>

    <label>Subject 4:</label>
    <input type="number" id="sub4"><br><br>

    <label>Subject 5:</label>
    <input type="number" id="sub5"><br><br>

    <button onclick="calculate()">Calculate</button>

    <h3 id="result"></h3>

    <script>
        function calculate() {
            let s1 = Number(document.getElementById("sub1").value);
            let s2 = Number(document.getElementById("sub2").value);
            let s3 = Number(document.getElementById("sub3").value);
            let s4 = Number(document.getElementById("sub4").value);
            let s5 = Number(document.getElementById("sub5").value);

            let total = s1 + s2 + s3 + s4 + s5;
            let percentage = (total / 500) * 100;

            let result = percentage >= 40 ? "Pass" : "Fail";

            document.getElementById("result").innerHTML =
                "Total Marks: " + total + "<br>" +
                "Percentage: " + percentage.toFixed(2) + "%<br>" +
                "Result: " + result;
        }
    </script>

</body>
</html>
